name: Build & Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: video-editor:latest

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff

      - name: Lint Python
        run: ruff check app/

      - name: Check formatting
        run: ruff format --check app/

  build-and-deploy:
    name: Build Image & Deploy
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Install project deps
        run: npm install

      - name: Login to Cloudflare
        run: wrangler login
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_TAG }} .
          echo "Image built successfully"
          docker images ${{ env.IMAGE_TAG }}

      - name: Push image to Cloudflare registry
        run: wrangler containers push ${{ env.IMAGE_TAG }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 10
          URL="https://videoeditor.${{ vars.CLOUDFLARE_SUBDOMAIN }}.workers.dev/health"
          echo "Checking: $URL"
          curl -f $URL || echo "Health check endpoint may take a moment to become available"
